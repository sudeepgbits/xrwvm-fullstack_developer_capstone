<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        .contact-container {
            background: white;
            border-radius: 40px;
            padding: 30px;
            margin-top: 50px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.2);
        }

        .top-image {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 10px;
        }

        .contact-section {
            margin-top: 30px;
        }

        .contact-img {
            width: 250px;
        }

        .divider {
            border-left: 3px solid #444;
            height: 300px;
            margin: auto;
        }

        .contact-text h3 {
            color: #5d7ce2;
            font-weight: bold;
        }

        .contact-text p {
            font-size: 22px;
            color: #5d7ce2;
            margin-bottom: 20px;
        }

        .navbar {
            background-color: #63c7cc;
        }

        .navbar-brand {
            font-size: 40px;
            font-weight: bold;
        }

        .nav-link {
            font-size: 24px;
            margin-left: 20px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light px-4">
        <a class="navbar-brand" href="#">Dealerships</a>

        <div class="navbar-nav ms-5">
            <a class="nav-link" href="#">Home</a>
            <a class="nav-link" href="#">About Us</a>
            <a class="nav-link active" href="#">Contact Us</a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <div class="contact-container">

            <!-- Top Car Image -->
            <img src="/static/cars.jpeg"
                 class="top-image"
                 alt="Cars Image">

            <!-- Bottom Section -->
            <div class="row contact-section align-items-center">

                <!-- Left Image -->
                <div class="col-md-5 text-center">
                    <img src="/static/contactus.png"
                         class="contact-img"
                         alt="Contact Person">
                </div>

                <!-- Divider -->
                <div class="col-md-1 d-flex justify-content-center">
                    <div class="divider"></div>
                </div>

                <!-- Contact Info -->
                <div class="col-md-6 contact-text text-center">

                    <h3>Contact Customer Service</h3>
                    <p>support@bestcars.com</p>

                    <h3>Contact our Sales Team</h3>
                    <p>sales@bestcars.com</p>

                    <h3>Public Relations</h3>
                    <p>pr@bestcars.com</p>

                    <h3>Office Contact</h3>
                    <p>+1 987-654-3210</p>

                    <h3>Become a Dealer Partner</h3>
                    <p>partner@bestcars.com</p>

                </div>

            </div>
        </div>
    </div>

</body>
</html>
